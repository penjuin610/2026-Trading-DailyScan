# ── 指数与 Regime ETF（必须完整，用于 L2）─────────────────────
regime_etfs:
  - SPY    # S&P 500
  - QQQ    # Nasdaq 100
  - IWM    # Russell 2000
  - DIA    # Dow Jones

# ── 板块 ETF（用于 L3 Breadth & Leadership）──────────────────
sector_etfs:
  XLK: Technology
  XLV: Healthcare
  XLE: Energy
  XLF: Financials
  XLI: Industrials
  XLY: Consumer Discretionary
  XLP: Consumer Staples
  XLU: Utilities
  XLB: Materials
  XLRE: Real Estate
  SMH: Semiconductors      # 高 beta 科技代理
  ARKK: Innovation/High Beta

